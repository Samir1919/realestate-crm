services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: realestate-crm-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      # Set MONGO_URI in .env.production.
